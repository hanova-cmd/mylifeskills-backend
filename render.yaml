services:
  - type: web
    name: mylifeskills-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn mental_health.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: mylifeskills-db
          property: connectionString

databases:
  - name: mylifeskills-db
    databaseName: mylifeskills
    user: mylifeskills
    plan: free